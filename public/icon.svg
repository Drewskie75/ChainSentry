<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Cyber Background Glow -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#0b0e14" />
  <rect x="2" y="2" width="124" height="124" rx="22" fill="none" stroke="#262f3f" stroke-width="2" />
  
  <!-- Outer Shield Structure -->
  <path d="M64,22 L100,32 L100,66 C100,88 83,103 64,108 C45,103 28,88 28,66 L28,32 Z" 
        fill="none" 
        stroke="url(#cyber-grad)" 
        stroke-width="6" 
        filter="url(#glow-effect)" />

  <!-- Core Blockchain Link Dot -->
  <circle cx="64" cy="62" r="12" fill="url(#cyber-grad)" filter="url(#glow-effect)" />
  
  <!-- Connecting Forensic Nodes -->
  <line x1="64" y1="36" x2="64" y2="50" stroke="url(#cyber-grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="64" y1="74" x2="64" y2="88" stroke="url(#cyber-grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="38" y1="62" x2="52" y2="62" stroke="url(#cyber-grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="76" y1="62" x2="90" y2="62" stroke="url(#cyber-grad)" stroke-width="4" stroke-linecap="round" />
</svg>
